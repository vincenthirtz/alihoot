<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alihoot! - Connexion Admin</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/player.css">
</head>
<body>
  <section class="screen active" role="main" aria-label="Connexion admin">
    <div class="card" style="text-align:center;">
      <div class="logo" style="color: var(--purple);">Alihoot!</div>
      <p style="color: var(--card-label); font-weight:600; margin-bottom:20px;">Connexion Admin</p>
      <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" class="input-field" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" class="input-field" placeholder="Mot de passe" autocomplete="current-password">
      </div>
      <button id="login-btn" class="btn btn-primary" style="width:100%;">Se connecter</button>
      <div id="login-error" class="error-msg" style="text-align:center;"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (async () => {
      const configRes = await fetch('/api/auth/config');
      const config = await configRes.json();

      if (!config.required) {
        window.location.href = '/admin';
        return;
      }

      const sb = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

      // Already logged in?
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        window.location.href = '/admin?token=' + session.access_token;
        return;
      }

      const loginBtn = document.getElementById('login-btn');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const errorEl = document.getElementById('login-error');

      loginBtn.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) { errorEl.textContent = 'Email et mot de passe requis'; return; }

        loginBtn.disabled = true;
        errorEl.textContent = '';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          errorEl.textContent = error.message;
          loginBtn.disabled = false;
          return;
        }

        window.location.href = '/admin?token=' + data.session.access_token;
      });

      passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
      emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });
    })();
  </script>
</body>
</html>
