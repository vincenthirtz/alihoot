<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alihoot! - Historique</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .history-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .history-header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .back-link {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }

    .history-card {
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .history-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); }
    .history-card.expanded { border-color: var(--purple); }

    .history-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .history-card-title {
      font-weight: 800;
      font-size: 1.2rem;
    }
    .history-card-meta {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      opacity: 0.8;
      font-weight: 600;
    }
    .history-card-date {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-top: 4px;
    }
    .history-rankings {
      margin-top: 15px;
      display: none;
    }
    .history-card.expanded .history-rankings {
      display: block;
    }
    .history-rank-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      margin: 4px 0;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      gap: 10px;
    }
    .history-rank-row .rank { font-weight: 900; width: 30px; text-align: center; font-size: 1.1rem; }
    .history-rank-row .rank.gold { color: #ffd700; }
    .history-rank-row .rank.silver { color: #c0c0c0; }
    .history-rank-row .rank.bronze { color: #cd7f32; }
    .history-rank-row .name { flex: 1; font-weight: 700; }
    .history-rank-row .score { font-weight: 800; }
    .history-rank-row .avatar {
      font-size: 1.3rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .loading { text-align: center; padding: 40px; opacity: 0.6; font-weight: 700; }
  </style>
</head>
<body>
  <div class="history-container">
    <div class="history-header">
      <h1>Historique des parties</h1>
      <a href="/admin" class="back-link">Retour au quiz</a>
    </div>
    <div id="history-list">
      <div class="loading">Chargement...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function loadHistory() {
      const container = document.getElementById('history-list');
      try {
        const res = await AdminAuth.authFetch('/api/history');
        const history = await res.json();

        if (!history.length) {
          container.innerHTML = '<div class="empty-state">Aucune partie jouee pour le moment</div>';
          return;
        }

        container.innerHTML = history.map((game, idx) => {
          const date = new Date(game.ended_at).toLocaleDateString('fr-FR', {
            day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const rankings = game.rankings || [];
          const winner = rankings[0];

          return `<div class="history-card" onclick="this.classList.toggle('expanded')">
            <div class="history-card-header">
              <div>
                <div class="history-card-title">${game.quiz_title}</div>
                <div class="history-card-date">${date}</div>
              </div>
              <div class="history-card-meta">
                <span>${game.player_count} joueur${game.player_count > 1 ? 's' : ''}</span>
                <span>${game.question_count} question${game.question_count > 1 ? 's' : ''}</span>
                ${winner ? `<span>Gagnant : ${winner.nickname}</span>` : ''}
              </div>
            </div>
            <div class="history-rankings">
              ${rankings.map((r, i) => {
                const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                return `<div class="history-rank-row">
                  <div class="avatar" style="background:${r.avatar?.color || '#666'}">${r.avatar?.icon || ''}</div>
                  <div class="rank ${rankClass}">${r.rank}</div>
                  <div class="name">${r.nickname}</div>
                  <div class="score">${r.score} pts</div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Erreur de chargement</div>';
        console.error(e);
      }
    }

    // Wait for auth init, then load
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadHistory, 300);
    });
  </script>
</body>
</html>
