<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alihoot! - Mon profil</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/common.css" />
    <style>
      .profile-container { width: 100%; max-width: 700px; margin: 0 auto; padding: 20px; }
      .profile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .profile-header h1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
      .profile-nav { display: flex; gap: 8px; }
      .profile-nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 700; font-size: 0.85rem; padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.2s; }
      .profile-nav a:hover { background: rgba(255,255,255,0.2); color: white; }

      .profile-card { background: rgba(255,255,255,0.1); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
      .profile-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 3px solid rgba(255,255,255,0.3); flex-shrink: 0; }
      .profile-info { flex: 1; min-width: 150px; }
      .profile-name { font-weight: 900; font-size: 1.5rem; }
      .profile-email { font-size: 0.85rem; opacity: 0.6; margin-top: 2px; }
      .profile-stats-grid { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
      .profile-stat { text-align: center; }
      .profile-stat-value { font-weight: 900; font-size: 1.3rem; }
      .profile-stat-label { font-size: 0.7rem; opacity: 0.6; font-weight: 700; text-transform: uppercase; }

      .section-title { font-weight: 800; font-size: 1.2rem; margin: 25px 0 12px; text-transform: uppercase; letter-spacing: 1px; }

      .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
      .achievement-card { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; text-align: center; transition: all 0.2s; }
      .achievement-card.locked { opacity: 0.35; filter: grayscale(1); }
      .achievement-card:not(.locked):hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
      .achievement-icon { font-size: 2rem; margin-bottom: 6px; }
      .achievement-title { font-weight: 800; font-size: 0.8rem; }
      .achievement-desc { font-size: 0.7rem; opacity: 0.7; margin-top: 3px; }
      .achievement-date { font-size: 0.65rem; opacity: 0.5; margin-top: 4px; }

      .game-row { display: flex; align-items: center; padding: 12px 16px; margin: 4px 0; background: rgba(255,255,255,0.08); border-radius: 10px; gap: 12px; flex-wrap: wrap; }
      .game-title { flex: 1; font-weight: 700; min-width: 120px; }
      .game-meta { display: flex; gap: 15px; font-size: 0.85rem; font-weight: 600; opacity: 0.8; }
      .game-rank { font-weight: 900; font-size: 1.1rem; }
      .game-rank.gold { color: #ffd700; }
      .game-rank.silver { color: #c0c0c0; }
      .game-rank.bronze { color: #cd7f32; }
      .game-date { font-size: 0.75rem; opacity: 0.5; }
      .game-score { font-weight: 800; }

      .empty-state { text-align: center; padding: 40px 20px; opacity: 0.6; font-weight: 700; font-size: 1rem; }
      .loading { text-align: center; padding: 40px; opacity: 0.6; font-weight: 700; }
      .not-registered { text-align: center; padding: 60px 20px; }
      .not-registered p { opacity: 0.7; margin-bottom: 20px; font-weight: 600; }
      .not-registered a { display: inline-block; padding: 12px 24px; background: var(--purple); color: white; text-decoration: none; border-radius: 10px; font-weight: 800; font-size: 1rem; }

      .logout-btn { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7); font-family: inherit; font-weight: 700; font-size: 0.8rem; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
      .logout-btn:hover { background: var(--red); color: white; }
    </style>
  </head>
  <body>
    <div class="profile-container">
      <div class="profile-header">
        <h1>Mon profil</h1>
        <div class="profile-nav">
          <a href="/">Jouer</a>
          <a href="/leaderboard">Classement</a>
          <button class="logout-btn" id="logout-btn">Deconnexion</button>
        </div>
      </div>
      <div id="profile-content">
        <div class="loading">Chargement...</div>
      </div>
    </div>
    <script type="module" src="/src/profile.js"></script>
  </body>
</html>
